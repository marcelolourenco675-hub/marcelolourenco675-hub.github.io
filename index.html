<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Célula Yeshua — Escala 2026</title>
  <meta name="description" content="Escala 2026 da Célula Yeshua — splash inicial com versículo aleatório; filtros por mês/função/pessoa; impressão; .ics; importação de Excel; logo fixa no topo e na tela inicial." />

  <!-- 🔒 Caminho FIXO da imagem (mesmo repositório). 
       Se mudar o nome/pasta, ajuste abaixo. -->
  <script>
    const FIXED_IMAGE_URL = 'logo-yeshua.jpg';
  </script>
  <link rel="preload" as="image" href="logo-yeshua.jpg" />

  <style>
    :root{
      --bg:#0f172a; --panel:#111827; --muted:#94a3b8; --text:#e5e7eb;
      --brand:#22c55e; --brand-2:#38bdf8; --chip:#1f2937; --chip-txt:#d1d5db;
      --shadow:0 10px 30px rgba(0,0,0,.25); --radius:14px; --accent:#7dd3fc;
      --corner-size:56px;
    }
    @media (prefers-color-scheme: light){
      :root{--bg:#f8fafc;--panel:#fff;--muted:#475569;--text:#0f172a;--chip:#f1f5f9;--chip-txt:#0f172a;--shadow:0 8px 20px rgba(2,6,23,.08)}
    }
    html,body{background:var(--bg); color:var(--text); margin:0; font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue','Noto Sans',Arial,"Apple Color Emoji","Segoe UI Emoji"}

    /* ===== Splash ===== */
    .intro{ position:fixed; inset:0; z-index:50; display:grid; place-items:center; padding:18px;
      background: radial-gradient(1200px 600px at 60% -10%, rgba(34,197,94,.15), transparent),
                  radial-gradient(1000px 600px at -10% 110%, rgba(56,189,248,.15), transparent), var(--bg);
      animation:fadeIn .4s ease }
    @keyframes fadeIn{from{opacity:0} to{opacity:1}}
    .intro-card{max-width:880px; width:100%; background:var(--panel); border:1px solid color-mix(in oklab, var(--muted) 22%, transparent); border-radius:18px; box-shadow:var(--shadow); display:grid; grid-template-columns:1fr; overflow:hidden}
    @media(min-width:880px){.intro-card{grid-template-columns:42% 1fr}}
    .intro-left{position:relative; min-height:240px; background:#000}
    .intro-left img{width:100%; height:100%; object-fit:cover}
    .intro-right{padding:18px 18px 16px; display:flex; flex-direction:column; gap:14px}
    .intro-title{font-size:clamp(22px,3.6vw,34px); font-weight:900; letter-spacing:.4px}
    .intro-verse{background: color-mix(in oklab, var(--chip) 85%, transparent); border:1px solid color-mix(in oklab, var(--muted) 25%, transparent); border-radius:14px; padding:12px 14px}
    .intro-verse .ref{color:var(--muted); font-weight:700; margin-bottom:6px}
    .intro-verse .txt{font-size:clamp(14px,1.8vw,16px); line-height:1.45}
    .intro-actions{display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:6px}
    .intro-btn{background:linear-gradient(135deg,var(--brand),var(--brand-2)); color:#001b0b; border:0; padding:12px 16px; border-radius:999px; font-weight:800; cursor:pointer; box-shadow:var(--shadow); font-size:16px}

    /* ===== Header / Controles ===== */
    header{position:sticky; top:0; z-index:10; backdrop-filter: blur(8px); background: color-mix(in oklab, var(--bg) 85%, transparent); border-bottom:1px solid color-mix(in oklab, var(--muted) 30%, transparent)}
    .wrap{max-width:1120px; margin:auto; padding:18px 16px}
    .header-wrap{position:relative}
    .brand{display:flex; align-items:center; gap:12px; margin-bottom:10px}
    .logo{width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,var(--brand),var(--brand-2)); display:grid; place-items:center; font-weight:800; color:#001b0b; box-shadow:var(--shadow)}
    h1{font-size:clamp(20px,2.6vw,28px); margin:0}
    .subtitle{color:var(--muted); font-size:14px}
    .corner-img{position:absolute; right:16px; top:12px; height:var(--corner-size); width:auto; object-fit:contain; border-radius:12px; box-shadow:var(--shadow); border:1px solid color-mix(in oklab, var(--muted) 30%, transparent); background:#ffffff10}
    @media(max-width:520px){.corner-img{height:44px; right:12px; top:10px}}

    .controls{display:grid; gap:10px; grid-template-columns:1fr; margin-top:8px}
    .controls .row{display:flex; flex-wrap:wrap; gap:10px}
    .controls label{display:flex; align-items:center; gap:8px; background:var(--panel); padding:8px 10px; border-radius:12px; border:1px solid color-mix(in oklab, var(--muted) 25%, transparent)}
    select,input[type="search"]{background:transparent; color:var(--text); border:0; outline:0; min-width:200px}
    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px}
    .btn{background:linear-gradient(135deg,var(--brand),var(--brand-2)); color:#001b0b; border:0; padding:10px 14px; border-radius:999px; font-weight:700; cursor:pointer; box-shadow:var(--shadow)}
    .btn.secondary{background:var(--panel); color:var(--text); border:1px solid color-mix(in oklab, var(--muted) 25%, transparent)}
    .btn.link{background:transparent; color:var(--accent); border:1px dashed color-mix(in oklab, var(--muted) 30%, transparent)}

    main .section-title{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:18px 0 6px; color:var(--muted); font-size:14px}
    .next-badge{background:#14532d; color:#dcfce7; padding:6px 10px; border-radius:999px; font-size:12px}
    @media (prefers-color-scheme: light){ .next-badge{background:#ecfdf5; color:#065f46} }

    .grid{display:grid; grid-template-columns:1fr; gap:14px}
    @media(min-width:760px){.grid{grid-template-columns:1fr 1fr}}
    @media(min-width:1040px){.grid{grid-template-columns:1fr 1fr 1fr}}

    .card{background:var(--panel); border-radius:var(--radius); padding:14px 14px 10px; border:1px solid color-mix(in oklab, var(--muted) 22%, transparent); box-shadow:var(--shadow); display:flex; flex-direction:column; gap:10px; min-height:160px}
    .date{display:flex; align-items:center; justify-content:space-between; gap:8px}
    .date .left{display:flex; align-items:baseline; gap:10px}
    .dow{color:var(--muted); font-weight:600}
    .day{font-size:clamp(22px, 3.2vw, 28px); font-weight:900; letter-spacing:.5px}
    .month{color:var(--muted); font-weight:600}

    .roles{display:grid; gap:8px}
    .role{display:flex; align-items:flex-start; gap:8px}
    .role .title{min-width:170px; font-weight:700; color:var(--muted)}
    .chips{display:flex; gap:6px; flex-wrap:wrap}
    .chip{background:var(--chip); color:var(--chip-txt); padding:6px 10px; border-radius:999px; font-size:12px}

    .card .foot{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:4px}
    .card .foot .btn{padding:8px 10px; font-size:12px}
    .empty{padding:20px; border:1px dashed color-mix(in oklab, var(--muted) 35%, transparent); border-radius:12px; color:var(--muted); text-align:center}

    .panel{background:var(--panel); border-radius:var(--radius); padding:14px; border:1px solid color-mix(in oklab, var(--muted) 22%, transparent); box-shadow:var(--shadow)}
    .panel h3{margin:0 0 10px 0; font-size:16px; color:var(--muted)}
    .names{display:grid; grid-template-columns:1fr; gap:10px}
    @media(min-width:700px){.names{grid-template-columns:1fr 1fr}}
    .name-item{display:flex; align-items:flex-start; justify-content:space-between; gap:8px; background: color-mix(in oklab, var(--chip) 85%, transparent); border:1px solid color-mix(in oklab, var(--muted) 25%, transparent); padding:10px; border-radius:12px}
    .name-item .title{font-weight:800}
    .name-item .meta{color:var(--muted); font-size:12px}
